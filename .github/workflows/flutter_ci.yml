name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.3'
          cache: true
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed lib test
      - run: flutter analyze
      - run: flutter test -r expanded --timeout 30s
      - name: Check patch whitespace
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            git diff --check "origin/$BASE_REF...$CURRENT_SHA"
          elif [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            git diff-tree --check --no-commit-id -r "$CURRENT_SHA"
          else
            git diff --check "$BEFORE_SHA" "$CURRENT_SHA"
          fi
